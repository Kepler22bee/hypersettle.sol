[workspace]
members = [
    "programs/*"
]
resolver = "2"

# Pin transitive deps that have bumped to edition2024, which the Solana SBPF
# toolchain (rustc 1.84.1 in platform-tools v1.51) doesn't support yet.
# These pins are enforced at the lockfile level by running
# `cargo update -p <crate> --precise <ver>` after a fresh resolve.

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
[profile.release.build-override]
opt-level = 3
incremental = false
codegen-units = 1
