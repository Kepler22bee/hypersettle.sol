[toolchain]
package_manager = "pnpm"
solana_version = "3.0.13"
platform_tools_version = "v1.54"

[features]
resolution = true
skip-lint = false

[programs.localnet]
hypersettle_hub = "57UTU1LKC3KUiFqP52KTB4StqTxzmq27XJdpunKhWo5i"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
